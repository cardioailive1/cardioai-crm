<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign in · Cardio AI CRM Pro</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#08131f;--bg2:#0f1e30;--bg3:#162840;
    --red:#e84040;--red2:#ff6b6b;--teal2:#5dcaa5;--amber2:#f5a623;
    --text:#e8f0f8;--text2:#8fa8c0;--text3:#4a6a88;
    --brd:rgba(100,160,220,.18);
  }
  html,body{height:100%}
  body{
    font-family:'JetBrains Mono',monospace;
    background:radial-gradient(1200px 600px at 50% -10%, #11243a 0%, var(--bg) 60%);
    color:var(--text);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .card{
    width:100%;max-width:392px;background:var(--bg2);
    border:1px solid var(--brd);border-radius:16px;
    padding:34px 30px 28px;text-align:center;
    box-shadow:0 30px 80px rgba(0,0,0,.45);
  }
  .logo{
    width:54px;height:54px;border-radius:14px;margin:0 auto 16px;
    display:flex;align-items:center;justify-content:center;font-size:28px;
    background:rgba(232,64,64,.12);border:1px solid rgba(232,64,64,.3);
  }
  h1{font-family:'Playfair Display',serif;font-size:21px;font-weight:900;letter-spacing:.2px}
  .sub{font-size:8px;color:var(--red);letter-spacing:3px;text-transform:uppercase;margin-top:4px}
  p.lead{color:var(--text2);font-size:11px;line-height:1.6;margin:16px 0 22px}
  .gbtn{
    display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
    background:#fff;color:#1f2937;text-decoration:none;font-weight:600;font-size:13px;
    padding:12px 16px;border-radius:10px;border:none;cursor:pointer;
    font-family:'JetBrains Mono',monospace;transition:transform .12s, box-shadow .12s;
  }
  .gbtn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(0,0,0,.35)}
  .gicon{width:18px;height:18px;flex-shrink:0}
  .note{margin-top:18px;font-size:9px;color:var(--text3);line-height:1.6}
  .err{
    display:none;margin-bottom:18px;padding:10px 12px;border-radius:9px;
    font-size:10px;line-height:1.5;text-align:left;
    background:rgba(232,64,64,.1);border:1px solid rgba(232,64,64,.3);color:var(--red2);
  }
  .err.show{display:block}
  .foot{margin-top:22px;padding-top:16px;border-top:1px solid var(--brd);font-size:8.5px;color:var(--text3);letter-spacing:.5px}
  a.link{color:var(--text2);text-decoration:none;border-bottom:1px dotted var(--text3)}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">🫀</div>
    <h1>Cardio AI CRM Pro</h1>
    <div class="sub">Sales &amp; Clinical CRM</div>

    <div id="err" class="err"></div>

    <p class="lead">Sign in with your company Google account to continue.</p>

    <a class="gbtn" href="/auth/google" id="signin">
      <svg class="gicon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Sign in with Google
    </a>

    <div class="note">
      Access is restricted to authorized Cardio AI team members.<br/>
      Trouble signing in? Contact your administrator.
    </div>

    <div class="foot">CARDIO AI · COLUMBUS, OHIO</div>
  </div>

  <script>
    // Surface friendly messages for the ?error= codes the server may redirect with.
    const MESSAGES = {
      domain_not_allowed: 'That account isn\u2019t on an approved company domain. Use your @cardioailive.com account.',
      google_not_configured: 'Google sign-in isn\u2019t configured yet. Set GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET on the server.',
      sign_in_failed: 'Sign-in failed. Please try again.',
    };
    const params = new URLSearchParams(location.search);
    const code = params.get('error');
    if (code) {
      const el = document.getElementById('err');
      el.textContent = MESSAGES[code] || ('Sign-in error: ' + code);
      el.classList.add('show');
    }
  </script>
</body>
</html>
